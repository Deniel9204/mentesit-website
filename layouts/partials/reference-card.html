<a class="card ref-card" href="{{ .RelPermalink }}">
  {{ with .Params.client }}<span class="card-file" aria-hidden="true">{{ . }}</span>{{ end }}
  <h3 class="card-title">{{ .Title }}</h3>
  {{ with .Params.summary }}<p class="card-summary">{{ . }}</p>{{ end }}
  {{ with .Params.tech }}<ul class="tag-list">{{ range . }}<li>{{ . }}</li>{{ end }}</ul>{{ end }}
</a>
