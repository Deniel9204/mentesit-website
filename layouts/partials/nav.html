<nav class="site-nav" aria-label="{{ i18n "nav_label" }}">
  <ul>
    {{ range site.Menus.main }}
      {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
      <li><a href="{{ .URL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
    {{ end }}
  </ul>
</nav>
