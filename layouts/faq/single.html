{{ define "main" }}
<article class="panel faq-page">
  <header class="panel-head">
    <p class="panel-file" aria-hidden="true">{{ .RelPermalink }}</p>
    <h1>{{ .Title }}</h1>
  </header>

  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}

  {{ with .Params.faqs }}
  <dl class="faq">
    {{ range . }}
    <div class="faq-item">
      <dt>{{ .q }}</dt>
      <dd>{{ .a }}</dd>
    </div>
    {{ end }}
  </dl>
  {{ end }}
</article>
{{ end }}
