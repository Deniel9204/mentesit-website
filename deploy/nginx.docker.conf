# nginx config for the containerised static site (TLS is terminated by your
# reverse proxy / ingress in front of this container).

# Privacy-first access log: anonymize the client IP (zero the last IPv4 octet /
# keep only the first IPv6 block) BEFORE writing it, so raw logs never store a
# full IP. Same field order as COMBINED, so GoAccess parses it with --log-format=COMBINED.
map $remote_addr $anon_ip {
    default                              "0.0.0.0";
    "~^(?<a>\d+\.\d+\.\d+)\."            "$a.0";
    "~^(?<p>[0-9a-fA-F]+:[0-9a-fA-F]+):" "$p::";
}
log_format privacy '$anon_ip - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve the real client IP from the proxy chain in front of this container
    # (so the anonymized log/analytics reflect visitors, not the proxy). Adjust
    # the trusted ranges to your setup; if Cloudflare proxies the site, also add
    # Cloudflare's ranges (or use CF-Connecting-IP). See DEPLOY.md.
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Write a real (non-symlinked) log file with anonymized IPs. GoAccess reads
    # this in the opt-in analytics overlay (docker-compose.analytics.yml).
    access_log /var/log/nginx/site.access.log privacy;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # CSP: 'unsafe-inline' on script-src covers only the inline JSON-LD blocks.
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self'; font-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'self'" always;

    # Pretty URLs
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Fingerprinted, content-hashed assets — cache hard.
    location ~* \.(css|js|woff2?|svg|png|jpe?g|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # HTML & sitemap — always revalidate.
    location ~* \.(html|xml)$ {
        add_header Cache-Control "no-cache";
    }

    # Proxy the contact form to the contact service. Uses a variable + Docker's
    # embedded DNS (127.0.0.11) so nginx starts even if the contact container
    # isn't up yet (it 502s until it is, instead of refusing to boot).
    location = /api/contact {
        limit_except POST { deny all; }
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $contact_upstream http://contact:8081;
        proxy_pass $contact_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ALTCHA captcha challenge (same contact service).
    location = /api/contact/challenge {
        limit_except GET { deny all; }
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $contact_chal http://contact:8081;
        proxy_pass $contact_chal;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Self-hosted GoAccess dashboard, same-origin + basic-auth. Dormant unless
    # the analytics overlay mounts the report + htpasswd (see DEPLOY.md).
    location /stats/ {
        auth_basic "MentesIT stats";
        auth_basic_user_file /etc/nginx/.htpasswd;
        alias /srv/goaccess/;
        index index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/rss+xml;
}
