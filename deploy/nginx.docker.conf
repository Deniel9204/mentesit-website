# nginx config for the containerised static site (TLS is terminated by your
# reverse proxy / ingress in front of this container).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # CSP: 'unsafe-inline' on script-src covers only the inline JSON-LD blocks.
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self'; font-src 'self'; form-action 'self'; base-uri 'self'; frame-ancestors 'self'" always;

    # Pretty URLs
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Fingerprinted, content-hashed assets — cache hard.
    location ~* \.(css|js|woff2?|svg|png|jpe?g|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # HTML & sitemap — always revalidate.
    location ~* \.(html|xml)$ {
        add_header Cache-Control "no-cache";
    }

    # Proxy the contact form to the contact service. Uses a variable + Docker's
    # embedded DNS (127.0.0.11) so nginx starts even if the contact container
    # isn't up yet (it 502s until it is, instead of refusing to boot).
    location = /api/contact {
        limit_except POST { deny all; }
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $contact_upstream http://contact:8081;
        proxy_pass $contact_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/rss+xml;
}
