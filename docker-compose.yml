# Self-host MentesIT / FreeIT: nginx static site + the Go contact endpoint.
#
#   1. cp .env.example .env   &&   edit .env (image refs + SMTP)
#   2. docker compose pull
#   3. docker compose up -d
#
# Terminate TLS with your own reverse proxy (Caddy / Traefik / host nginx) in
# front of the `web` service on ${WEB_PORT}.

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/deniel9204/mentesit-website-web:latest}
    restart: unless-stopped
    depends_on:
      - contact
    ports:
      - "${WEB_PORT:-8080}:80"

  contact:
    image: ${CONTACT_IMAGE:-ghcr.io/deniel9204/mentesit-website-contact:latest}
    restart: unless-stopped
    environment:
      CONTACT_ADDR: "0.0.0.0:8081"
      SMTP_HOST: "${SMTP_HOST:?set SMTP_HOST in .env}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@mentesit.eu}"
      MAIL_TO: "${MAIL_TO:-info@mentesit.eu}"
      SUCCESS_URL: "${SUCCESS_URL:-https://mentesit.eu/kapcsolat/}"
      # Only the web container (this network) may set X-Forwarded-For; the real
      # client IP is then read from it for per-IP rate limiting.
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-172.28.0.0/16}"
      # Signs ALTCHA captcha challenges. Empty -> ephemeral key per restart
      # (fine for one replica). Set it in .env for stable/multi-replica deploys.
      ALTCHA_HMAC_KEY: "${ALTCHA_HMAC_KEY:-}"
    expose:
      - "8081"

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16
